artifacts:
  segmentation_rknn:
    path: "/home/elf/cloudmeasure_models/cargo_instance_seg_int8.rknn"
    sha256: ""
    source_onnx: "models/exported/cargo_instance_seg.onnx"
    converter: "scripts/convert_onnx_to_rknn.py"
    input_shape: [1, 8, 512, 512]
    output_heads:
      heatmap: [1, 1, 512, 512]
      offset: [1, 2, 512, 512]
      dimensions: [1, 3, 512, 512]
      yaw: [1, 1, 512, 512]
  voxelnet_rknn:
    path: "/home/elf/cloudmeasure_models/voxelnet_mini_cargo_cls_int8.rknn"
    sha256: ""
    source_onnx: "models/exported/voxelnet_mini_cargo_cls.onnx"
    converter: "scripts/convert_onnx_to_rknn.py"
    input_shape: [1, 4, 32, 32, 32]
    labels: ["cargo_box", "background", "unknown"]
  occupancy_checkpoint:
    path: "/home/elf/cloudmeasure_models/neural_occupancy_field.pt"
    sha256: ""
    trainer: "training/train_occupancy_field.py"
    export_script: "scripts/export_reference_models.py"
    onnx_export_script: "scripts/export_occupancy_to_onnx.py"
    optional_rknn_conversion: "scripts/convert_onnx_to_rknn.py --onnx models/exported/neural_occupancy_field.onnx --rknn /home/elf/cloudmeasure_models/neural_occupancy_field_int8.rknn"
  bev_yolo_pretrained:
    path: "models/third_party/yolo/yolov8n.pt"
    sha256: "f59b3d833e2ff32e194b5bb8e08d211dc7c5bdf144b90d2c8412c47ccfc83b36"
    size_bytes: 6549796
    source_project: "Ultralytics YOLOv8"
    source_url: "https://github.com/ultralytics/assets/releases/download/v8.3.0/yolov8n.pt"
    license: "AGPL-3.0"
    input_adapter: "cloudmeasure_edge/bev_yolo_detector.py"
    export_script: "scripts/export_yolo_to_onnx.py --weights models/third_party/yolo/yolov8n.pt --output models/exported/bev_yolo_yolov8n.onnx"
    optional_rknn_conversion: "scripts/convert_onnx_to_rknn.py --onnx models/exported/bev_yolo_yolov8n.onnx --rknn /home/elf/cloudmeasure_models/bev_yolo_yolov8n_int8.rknn"
    runtime_command: "python scripts/run_bev_yolo.py --config configs/edge_runtime.yaml --pcd /data/cloudmeasure/pcd/fast_livo2_colored_map.pcd --bbox-min -2 -2 -0.2 --bbox-max 4 3 2.5"
    purpose: "Third-party pretrained YOLO checkpoint used as a BEV candidate detector and fine-tuning initialization weight."

verification:
  checksum_command: "sha256sum /home/elf/cloudmeasure_models/*"
  runtime_probe_command: "python -m cloudmeasure_edge.pipeline --config configs/edge_runtime.yaml --pcd /data/cloudmeasure/pcd/fast_livo2_colored_map.pcd --bbox-min -2 -2 -0.2 --bbox-max 4 3 2.5"
