board:
  host: "192.168.0.148"
  user: "elf"
  ssh_key_path: ""
  known_hosts_path: "~/.ssh/known_hosts"
  strict_host_key_checking: true
  use_sudo_for_npu_load: true
  npu_load_path: "/sys/kernel/debug/rknpu/load"

paths:
  allowed_pcd_root: "/data/cloudmeasure/pcd"
  model_manifest: "configs/model_manifest.yaml"

limits:
  max_pcd_bytes: 2147483648
  max_pcd_points: 8000000
  max_bbox_volume_m3: 80.0
  max_bbox_edge_m: 12.0

models:
  segmentation_rknn: "/home/elf/cloudmeasure_models/cargo_instance_seg_int8.rknn"
  voxelnet_rknn: "/home/elf/cloudmeasure_models/voxelnet_mini_cargo_cls_int8.rknn"
  occupancy_checkpoint: "/home/elf/cloudmeasure_models/neural_occupancy_field.pt"
  bev_yolo_pt: "models/third_party/yolo/yolov8n.pt"

segmentation:
  grid_size: 512
  score_threshold: 0.45
  min_component_cells: 18
  max_instances: 16
  roi_feature_range_m: [-3.0, -3.0, -0.4, 5.0, 4.0, 2.6]

voxelnet:
  voxel_size_m: 0.05
  grid_shape: [32, 32, 32]
  labels: ["cargo_box", "background", "unknown"]

bev_yolo:
  enabled: true
  grid_size: 640
  confidence_threshold: 0.25
  max_detections: 16
  min_points_per_detection: 32
  class_names: ["cargo_box"]

occupancy:
  runtime: "torch"
  samples_per_object: 131072
  occupancy_threshold: 0.5
  batch_size: 8192
